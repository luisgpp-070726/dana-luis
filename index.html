<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi princesa Dana ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stars"></div>

    <!-- Pantalla Inicial -->
    <div id="intro" class="screen">
        <div id="envelope">💌</div>
        <p style="color: #ff99ac; font-size: 1.2rem; margin-top: 20px;">Toca el sobre para abrirlo</p>
    </div>

    <!-- Contenido Principal -->
    <div id="main-content" class="screen hidden">
        <h1>Nuestra Historia de Amor</h1>
        <div id="timer"></div>
        <div id="letter">
            <p id="typewriter"></p>
        </div>
        <div class="buttons">
            <button onclick="openRazones()">✨ 100 Razones</button>
            <button onclick="openPromesas()">💍 Promesas</button>
            <button onclick="openDiario()">📖 Diario</button>
            <button onclick="openRazones()">💖 ¿Por qué te amo?</button>
            <button onclick="playSong()">🎵 Nuestra canción</button>
        </div>
    </div>

    <!-- Modal General -->
    <div id="modal-card">
        <div class="card-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="color: #ff4d6d; margin-top: 10px;"></h2>
            <div id="modal-body" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
