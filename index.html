<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi princesa Dana ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(#08142b,#1f3b73,#ff7eb3);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,.3);
animation:aparecer 2s;
}

h1{
font-size:34px;
margin-bottom:20px;
}

p{
font-size:18px;
line-height:1.7;
margin-bottom:15px;
}

button{
margin-top:20px;
padding:15px 25px;
border:none;
border-radius:40px;
background:#ff2d75;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

@keyframes aparecer{
from{
opacity:0;
transform:scale(.7);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>

</head>

<body>

<div class="card">

<h1>
Mi princesa Dana ❤️
</h1>

<p>
Si encontraste esta página...
es porque existe alguien que te ama con todo su corazón.
</p>

<p>
Este detalle fue creado únicamente para ti.
</p>

<button onclick="alert('Muy pronto descubrirás toda la sorpresa que Luis preparó para ti ❤️')">
Abrir sorpresa
</button>

</div>

</body>
</html>
